<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
</head>

<body class="bg-black flex items-center justify-center h-screen">
  <form class="bg-white w-1/3 rounded-xl p-12 space-y-6">
    <!-- title form -->
    <div>
      <h2 class="text-2xl text-purple-600 text-center">
        Login Form
      </h2>
    </div>
    <!-- main inputs -->
    <form class="space-y-5 w-full" id="">
      <div class="space-y-3">
        <!-- input userName -->
        <input type="text"
          class="bg-gray-200 rounded-xl py-5 px-4 w-full focus:outline-2 focus:outline-purple-600 outline-offset-2"
          placeholder="UserName..." id="username-input">
        <!-- input Password -->
        <input type="password"
          class="bg-gray-200 rounded-xl py-5 px-4 w-full focus:outline-2 focus:outline-purple-600 outline-offset-2 "
          placeholder="Password...">
      </div>
      <!-- submit form -->
      <input type="submit" value="Send Form"
        class="bg-purple-300 p-5 rounded-xl w-full transition-all duration-300 hover:bg-purple-500  hover:text-white cursor-pointer">
    </form>
  </form>
  <script src="./script.js"></script>
</body>

</html>
